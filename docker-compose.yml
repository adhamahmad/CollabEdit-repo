services:

  backend:
    build:
      context: ./Backend/CollabEdit
      dockerfile: Dockerfile
    # No ports mapping — backend is internal to the Docker network only.
    # Only the frontend (Nginx) container can reach it via http://backend:8080.
    # It is never reachable from the host or the public internet.
    networks:
      - app
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend/collab-edit-frontend
      dockerfile: Dockerfile
    ports:
      # HOST_PORT:CONTAINER_PORT
      # Override by setting PORT in .env (e.g. PORT=8081).
      # Shell env vars also work: PORT=8081 docker compose up
      - "${PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge
    # Both containers share this network.
    # Docker's embedded DNS resolves "backend" to the backend container's
    # internal IP — this is what lets nginx.conf use http://backend:8080.
