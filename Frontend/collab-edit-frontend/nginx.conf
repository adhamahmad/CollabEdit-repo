# Nginx connection upgrade map — required for correct WebSocket proxying.
#
# The Connection header must be "upgrade" when the client is upgrading,
# and "close" (or "") otherwise. Using a hardcoded "upgrade" for all
# connections breaks regular HTTP keep-alive for /api requests.
# This map handles both cases correctly based on what the client sent.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # ── Static frontend ──────────────────────────────────────────────────────
    # Serve the Vite build output.
    # try_files is essential for client-side routing (React Router):
    # any path that isn't a real file falls back to index.html so React
    # Router can handle it — without this, a hard refresh on /:id returns 404.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── REST API ─────────────────────────────────────────────────────────────
    # Proxies /api/* to the backend container, stripping the /api prefix.
    #
    # /api/             → http://backend:8080/
    # /api/abc123       → http://backend:8080/abc123
    # /api/abc123/snapshot → http://backend:8080/abc123/snapshot
    #
    # Spring Boot routes are unchanged — it has no knowledge of /api.
    location /api/ {
        proxy_pass http://backend:8080/;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (STOMP) ─────────────────────────────────────────────────────
    # Proxies the STOMP WebSocket endpoint to the backend.
    #
    # How the WebSocket upgrade works through Nginx:
    #   1. Browser sends HTTP/1.1 GET /ws with headers:
    #        Connection: Upgrade
    #        Upgrade: websocket
    #   2. These are "hop-by-hop" headers — Nginx strips them by default
    #      and would forward a plain HTTP request, causing the backend
    #      to reject it with 400 Bad Request.
    #   3. proxy_set_header Upgrade $http_upgrade re-adds the Upgrade header.
    #   4. proxy_set_header Connection $connection_upgrade sets Connection
    #      correctly for both upgrade requests and regular HTTP (via the map
    #      defined above). A hardcoded "upgrade" would break keep-alive on
    #      non-WS connections — the map is the correct production pattern.
    #   5. proxy_http_version 1.1 is mandatory — WebSocket requires HTTP/1.1
    #      persistent connections; the default proxy version is HTTP/1.0.
    #
    # The backend registers this endpoint in WebSocketConfig.java:
    #   registry.addEndpoint("/ws")
    # Native WebSocket only — no SockJS. SockJS uses HTTP polling fallbacks
    # at /ws/info, /ws/<server>/<session>/xhr, etc., which would need
    # additional location blocks. Since websocket.js uses native WS
    # (brokerURL not webSocketFactory+SockJS), this single block is correct.
    location /ws {
        proxy_pass http://backend:8080/ws;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extend timeouts for long-lived WebSocket connections.
        # Default is 60s — an idle editor would be disconnected constantly.
        # 1 hour is a reasonable ceiling; STOMP reconnects handle the rest.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
